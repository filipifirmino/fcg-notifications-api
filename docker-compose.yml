version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fcg_notifications_postgres
    environment:
      POSTGRES_USER: fcg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fcg_secret}
      POSTGRES_DB: fcg_notifications_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcg -d fcg_notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fcg_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  notifications-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcg_notifications_worker
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=fcg_notifications_db;Username=fcg;Password=${POSTGRES_PASSWORD:-fcg_secret}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - DOTNET_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
